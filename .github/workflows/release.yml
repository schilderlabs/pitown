name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "pitown-v*"
      - "pitown-core-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Resolve release package from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"

          case "$TAG" in
            pitown-v*)
              PACKAGE_NAME="@schilderlabs/pitown"
              PACKAGE_DIR="packages/cli"
              VERSION="${TAG#pitown-v}"
              ;;
            pitown-core-v*)
              PACKAGE_NAME="@schilderlabs/pitown-core"
              PACKAGE_DIR="packages/core"
              VERSION="${TAG#pitown-core-v}"
              ;;
            *)
              echo "Unsupported tag: $TAG"
              exit 1
              ;;
          esac

          PACKAGE_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('./${PACKAGE_DIR}/package.json', 'utf8')).version")

          if [ "$VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION does not match ${PACKAGE_NAME} package.json version $PACKAGE_VERSION"
            exit 1
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: "@schilderlabs"

      - name: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm --filter ${{ steps.meta.outputs.package_name }} publish --access public --no-git-checks

      - name: Publish package to GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@schilderlabs"

      - name: GitHub Packages publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter ${{ steps.meta.outputs.package_name }} publish --no-git-checks --registry https://npm.pkg.github.com

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "${{ steps.meta.outputs.package_name }} v${{ steps.meta.outputs.package_version }}" \
            --generate-notes
