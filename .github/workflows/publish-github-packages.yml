name: publish-github-packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@schilderlabs"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build packages
        run: pnpm build

      - name: Publish @schilderlabs/pitown-core to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('./packages/core/package.json', 'utf8')).version")
          PUBLISHED_VERSION=$(npm view @schilderlabs/pitown-core version --registry=https://npm.pkg.github.com 2>/dev/null || true)
          if [ "$PUBLISHED_VERSION" = "$CURRENT_VERSION" ]; then
            echo "@schilderlabs/pitown-core@$CURRENT_VERSION is already published to GitHub Packages"
            exit 0
          fi
          pnpm --filter @schilderlabs/pitown-core publish --no-git-checks --registry https://npm.pkg.github.com

      - name: Publish @schilderlabs/pitown to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('./packages/cli/package.json', 'utf8')).version")
          PUBLISHED_VERSION=$(npm view @schilderlabs/pitown version --registry=https://npm.pkg.github.com 2>/dev/null || true)
          if [ "$PUBLISHED_VERSION" = "$CURRENT_VERSION" ]; then
            echo "@schilderlabs/pitown@$CURRENT_VERSION is already published to GitHub Packages"
            exit 0
          fi
          pnpm --filter @schilderlabs/pitown publish --no-git-checks --registry https://npm.pkg.github.com
